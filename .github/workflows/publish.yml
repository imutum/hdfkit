name: Publish hdfkit to pypi.mutum.top

on:
  push:
    tags:
      - '*'

jobs:
  build-n-publish:
    name: Build and publish hdfkit to pypi.mutum.top
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Install uv
      uses: astral-sh/setup-uv@v5
    - name: Set up Python 3.13
      run: uv python install 3.13
    - name: Install dependencies
      run: uv sync
    - name: Run tests
      run: uv run pytest
    - name: Build wheel
      run: uv build --wheel --out-dir dist/
    - name: Publish to pypi.mutum.top
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://pypi.mutum.top:16181/
        user: ${{ secrets.MUTUM_PYPI_USER }}
        password: ${{ secrets.MUTUM_PYPI_PASSWORD }}
